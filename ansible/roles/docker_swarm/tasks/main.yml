---
- name: Install prerequisites
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg, lsb-release]
    state: present
    update_cache: true

- name: Add Docker apt key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure docker.service.d exists
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"

- name: Docker daemon TCP listener (systemd override)
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/dockerd -H fd:// -H {{ swarm_vars.docker_api_bind }}
  notify:
    - reload systemd
    - restart docker

- name: Allow Docker API from CI subnet only
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "2375"
    source: "{{ swarm_vars.docker_api_allow_cidr }}"
    jump: ACCEPT
    comment: "Docker API from CI VLAN"

- name: Drop Docker API from everywhere else
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "2375"
    jump: DROP
    comment: "Block public access to Docker API"

# Idempotency: check the current swarm state before initializing.
- name: Check if the node is already part of a swarm
  ansible.builtin.shell: docker info --format '{{ "{{" }} .Swarm.LocalNodeState {{ "}}" }}'
  register: swarm_status
  changed_when: false

- name: Initialize Docker Swarm (single node)
  ansible.builtin.shell: >-
    docker swarm init
    --advertise-addr {{ swarm_vars.swarm_advertise_addr }}
    --data-path-port=5789
  when: swarm_status.stdout | trim != "active"
